<div id="creator-screen" class="screen">
    <div class="creator-card">
        <h2>📝 Create Your Test</h2>
        
        <div class="input-group">
            <label>Test Title (Optional)</label>
            <input type="text" id="test-title" placeholder="e.g., Full Syllabus Mock">
        </div>

        <div class="input-group">
            <label>Duration (minutes)</label>
            <input type="number" id="test-duration" value="180" min="1" max="180">
        </div>

        <!-- Physics Section -->
        <div class="subject-section">
            <h3>🔬 Physics Questions</h3>
            <textarea id="physics-questions" rows="6" placeholder="Paste Physics questions here..."></textarea>
        </div>

        <!-- Chemistry Section -->
        <div class="subject-section">
            <h3>🧪 Chemistry Questions</h3>
            <textarea id="chemistry-questions" rows="6" placeholder="Paste Chemistry questions here... (Organic/Inorganic/Physical)"></textarea>
        </div>

        <!-- Biology Section -->
        <div class="subject-section">
            <h3>🧬 Biology Questions</h3>
            <textarea id="biology-questions" rows="6" placeholder="Paste Botany/Zoology questions here..."></textarea>
        </div>

        <div class="sample-btn" onclick="loadSample()">📋 Load Sample Questions</div>
        
        <button class="btn-primary" onclick="generateTest()">🚀 Generate Test Now</button>
        <button class="btn-secondary" onclick="showWelcome()">← Back</button>
    </div>
</div>
